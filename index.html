<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="nocApp()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Cafe | Shop</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        espresso: '#110F0E',
                        warmBeige: '#F7F4F0',
                        goldAccent: '#D4AF37',
                        softBrown: '#8C7A6B'
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: system-ui, -apple-system, sans-serif; }
        .product-card:hover .add-btn { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-warmBeige text-espresso antialiased">

    <nav class="fixed top-0 w-full bg-espresso text-white py-4 px-6 z-50 shadow-2xl border-b border-goldAccent/20">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-8 space-x-reverse">
                <a href="#" @click.prevent="currentTab = 'home'" class="text-2xl font-bold tracking-widest text-goldAccent">NOC CAFE</a>
                <div class="hidden md:flex space-x-6 space-x-reverse text-[10px] uppercase tracking-[0.2em] font-bold">
                    <button @click="currentTab = 'home'" :class="currentTab === 'home' ? 'text-goldAccent' : 'text-gray-400'" class="hover:text-white transition">الرئيسية</button>
                    <button @click="currentTab = 'shop'" :class="currentTab === 'shop' ? 'text-goldAccent' : 'text-gray-400'" class="hover:text-white transition">متجر الحبوب (Shop)</button>
                </div>
            </div>

            <div class="flex items-center space-x-4 space-x-reverse">
                <button @click="cartOpen = true" class="relative p-2">
                    <i class="fa-solid fa-bag-shopping text-goldAccent"></i>
                    <span x-show="cart.length > 0" class="absolute -top-1 -right-1 bg-white text-espresso text-[9px] font-black rounded-full w-4 h-4 flex items-center justify-center" x-text="cart.reduce((sum, item) => sum + item.qty, 0)"></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-24 min-h-screen">

        <div x-show="currentTab === 'home'" x-cloak x-transition>
            <section class="h-[80vh] flex items-center justify-center bg-espresso relative overflow-hidden">
                <div class="absolute inset-0 opacity-30">
                    <img src="images/IMG_8064.jpeg" class="w-full h-full object-cover grayscale">
                </div>
                <div class="relative z-10 text-center px-6">
                    <h1 class="text-4xl md:text-7xl font-light text-white tracking-tight mb-6">تجربة القهوة <span class="text-goldAccent font-bold">السيادية</span></h1>
                    <button @click="currentTab = 'shop'" class="bg-goldAccent text-espresso text-xs font-black uppercase tracking-[0.2em] px-10 py-5 hover:bg-white transition shadow-xl">تصفح المتجر الآن</button>
                </div>
            </section>
        </div>

        <div x-show="currentTab === 'shop'" x-cloak x-transition class="max-w-7xl mx-auto px-6 py-12">
            <header class="text-center mb-16">
                <span class="text-goldAccent text-[10px] font-black uppercase tracking-[0.4em]">The Retail Collection</span>
                <h2 class="text-3xl md:text-5xl font-bold mt-4">مجموعة حبوب "نون" الحصرية</h2>
                <div class="h-[1px] w-20 bg-softBrown/30 mx-auto mt-6"></div>
            </header>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-8 gap-y-12">
                <template x-for="p in products" :key="p.id">
                    <div class="product-card group flex flex-col">
                        <div class="relative aspect-[4/5] bg-white overflow-hidden border border-gray-100 shadow-sm transition-all duration-500 group-hover:shadow-xl">
                            <img :src="'images/' + p.img" class="w-full h-full object-contain p-4 transition-transform duration-700 group-hover:scale-110" :alt="p.name">
                            <div class="absolute inset-x-0 bottom-0 p-4 translate-y-full opacity-0 add-btn transition-all duration-300">
                                <button @click="addToCart(p)" class="w-full bg-espresso text-white text-[10px] font-bold py-3 uppercase tracking-widest hover:bg-goldAccent hover:text-espresso transition">إضافة للسلة</button>
                            </div>
                        </div>
                        <div class="mt-5 space-y-2">
                            <div class="flex justify-between items-start">
                                <h3 class="text-xs font-black uppercase tracking-wider text-espresso" x-text="p.name"></h3>
                                <span class="text-goldAccent font-bold text-sm" x-text="p.price + ' ر.س'"></span>
                            </div>
                            <p class="text-[11px] text-softBrown leading-relaxed" x-text="p.desc"></p>
                            <div class="flex items-center space-x-2 space-x-reverse pt-2">
                                <span class="w-2 h-2 rounded-full bg-goldAccent/30"></span>
                                <span class="text-[9px] text-gray-400 uppercase tracking-widest" x-text="p.notes"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

    </main>

    <div x-show="cartOpen" class="fixed inset-0 z-[60]" x-cloak>
        <div class="absolute inset-0 bg-espresso/40 backdrop-blur-sm" @click="cartOpen = false"></div>
        <div class="absolute inset-y-0 left-0 w-full max-w-md bg-white shadow-2xl flex flex-col" x-transition:enter="transition transform duration-300" x-transition:enter-start="-translate-x-full">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h2 class="font-black text-xs uppercase tracking-widest">حقيبة التسوق</h2>
                <button @click="cartOpen = false" class="text-gray-400 hover:text-espresso"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <template x-for="item in cart" :key="item.id">
                    <div class="flex items-center space-x-4 space-x-reverse">
                        <img :src="'images/' + item.img" class="w-16 h-16 object-contain bg-gray-50 p-2 border">
                        <div class="flex-1">
                            <h4 class="text-[10px] font-black" x-text="item.name"></h4>
                            <p class="text-xs text-goldAccent font-bold" x-text="item.price + ' ر.س'"></p>
                        </div>
                        <div class="flex items-center border border-gray-200">
                            <button @click="updateQty(item.id, -1)" class="px-2 py-1 text-xs">-</button>
                            <span class="px-2 text-xs font-bold" x-text="item.qty"></span>
                            <button @click="updateQty(item.id, 1)" class="px-2 py-1 text-xs">+</button>
                        </div>
                    </div>
                </template>
            </div>
            <div class="p-6 bg-gray-50 border-t border-gray-100">
                <div class="flex justify-between mb-4 font-black">
                    <span class="text-xs">المجموع الإجمالي</span>
                    <span class="text-goldAccent" x-text="getCartTotal() + ' ر.س'"></span>
                </div>
                <button class="w-full bg-espresso text-white py-4 text-[10px] font-black uppercase tracking-widest hover:bg-goldAccent hover:text-espresso transition">إتمام الطلب والدفع</button>
            </div>
        </div>
    </div>

    <script>
        function nocApp() {
            return {
                currentTab: 'shop',
                cartOpen: false,
                cart: [],
                products: [
                    { id: 1, name: 'Peru Premium', img: 'IMG_8047.jpeg', price: 68, desc: 'معالجة مغسولة، سلالة كاتورا، إيحاءات الكرز واللوز.', notes: 'Pink Bag' },
                    { id: 2, name: 'Ethiopian Sidamo', img: 'IMG_8048.jpeg', price: 72, desc: 'إيحاءات الفواكه المجففة والياسمين، حمضية متزنة.', notes: 'Orange/Black Bag' },
                    { id: 3, name: 'El Salvador', img: 'IMG_8049.jpeg', price: 65, desc: 'بن غني من الجبال العالية، إيحاءات الكاكاو والبندق.', notes: 'Bird/Mountains' },
                    { id: 4, name: 'Costa Rica', img: 'IMG_8050.jpeg', price: 70, desc: 'معالجة عسلية، قوام ممتلئ، حلاوة واضحة وأشجار خضراء.', notes: 'Green Trees' },
                    { id: 5, name: 'Guatemala', img: 'IMG_8051.jpeg', price: 67, desc: 'نكهات الشوكولاتة والكراميل، قوام كريمي فاخر.', notes: 'Yellow/Elephant' },
                    { id: 6, name: 'Brazil Fazenda', img: 'IMG_8052.jpeg', price: 58, desc: 'كلاسيكية البرازيل، مكسرات وحلاوة قصب السكر.', notes: 'Red/Monkey' },
                    { id: 7, name: 'Tanzania AA', img: 'IMG_8053.jpeg', price: 64, desc: 'حمضية ساطعة تشبه التوت، قوام متوسط ومنعش.', notes: 'Bird Design' },
                    { id: 8, name: 'Colombia Lion', img: 'IMG_8054.jpeg', price: 74, desc: 'إيحاءات العنب والكرز، سلالة كاستيلو الفاخرة.', notes: 'Lion/Blue Hair' },
                    { id: 9, name: 'Panama Estate', img: 'IMG_8055.jpeg', price: 88, desc: 'طعم زهري معقد، لمسات من الشاي الأخضر والليمون.', notes: 'Yellow/Green Birds' },
                    { id: 10, name: 'Rwanda Remera', img: 'IMG_8056.jpeg', price: 69, desc: 'إيحاءات التوت الأحمر والبرتقال، معالجة مغسولة.', notes: 'African Woman' },
                    { id: 11, name: 'Sumatra Tiger', img: 'IMG_8057.jpeg', price: 75, desc: 'قوام ثقيل جداً، إيحاءات أرضية وتوابل وشوكولاتة.', notes: 'Tiger/Approved' },
                    { id: 12, name: 'Kenya PB', img: 'IMG_8058.jpeg', price: 78, desc: 'إيحاءات الكركديه والزبيب الأسود، حمضية فواكه.', notes: 'Elephant Landscape' },
                    { id: 13, name: 'Yemeni Mocha', img: 'IMG_8059.jpeg', price: 120, desc: 'أصالة القهوة اليمنية، نكهات توابل وتمر وشوكولاتة.', notes: 'Whole Coffee' },
                    { id: 14, name: 'Mexican Coffee', img: 'IMG_8060.jpeg', price: 62, desc: 'قهوة ناعمة، متزنة جداً مع لمسات من المكسرات.', notes: 'Black Bag' },
                    { id: 15, name: 'Uganda Reserve', img: 'IMG_8061.jpeg', price: 60, desc: 'إيحاءات قوية، مرارة لطيفة وحلاوة فانيلا.', notes: 'Woman in Pink' },
                    { id: 16, name: 'Nicaragua Sunset', img: 'IMG_8062.jpeg', price: 66, desc: 'قوام ناعم، إيحاءات فاكهية هادئة وسكر بني.', notes: 'Sunset Landscape' },
                    { id: 17, name: 'Honduras Deer', img: 'IMG_8063.jpeg', price: 63, desc: 'معالجة مغسولة، متزنة بلمسات من التفاح الأخضر.', notes: 'Deer/Approved' },
                    { id: 18, name: 'Espresso Blend', img: 'IMG_8064.jpeg', price: 85, desc: 'الخلطة السرية لـ NOC، مثالية لمشروبات الحليب.', notes: 'Signature Black' }
                ],
                addToCart(p) {
                    let found = this.cart.find(i => i.id === p.id);
                    if (found) { found.qty++; } else { this.cart.push({...p, qty: 1}); }
                    this.cartOpen = true;
                },
                updateQty(id, delta) {
                    let found = this.cart.find(i => i.id === id);
                    if (found) {
                        found.qty += delta;
                        if (found.qty <= 0) this.cart = this.cart.filter(i => i.id !== id);
                    }
                },
                getCartTotal() {
                    return this.cart.reduce((s, i) => s + (i.price * i.qty), 0);
                }
            }
        }
    </script>
</body>
</html>
